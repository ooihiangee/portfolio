<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Data Science</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white text-slate-900 antialiased">
    <div id="access-gate" class="access-gate">
        <div class="access-card">
            <div class="access-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="4" y="10" width="16" height="10" rx="2" ry="2"></rect>
                    <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                    <circle cx="12" cy="15" r="1.5"></circle>
                </svg>
            </div>
            <h1>Private Portfolio Access</h1>
            <p>Passcode: Last 4 digits of the phone number.</p>
            <form id="passcode-form" class="passcode-form">
                <input id="passcode-input" type="password" placeholder="Enter the passcode." autocomplete="off" autofocus />
                <button type="submit">Unlock</button>
            </form>
            <p id="passcode-message" class="passcode-message"></p>
        </div>
    </div>

    <div id="portfolio-content" class="portfolio-content hidden">
        <nav class="top-nav">
            <a href="#hero">Home</a>
            <a href="#projects">Projects</a>
            <a href="#skills">Skills</a>
            <a href="#experience">Experience</a>
            <a href="#education">Education</a>
            <a href="#contact">Contact</a>
        </nav>

        <button id="theme-toggle" type="button" class="theme-toggle" aria-pressed="false">
            <i data-lucide="moon" class="w-5 h-5"></i>
            <span class="ml-2 text-sm font-semibold">Dark Mode</span>
        </button>

        <!-- Hero Section -->
        <header id="hero" class="py-24 px-6 max-w-6xl mx-auto">
            <div id="hero-content"></div>
        </header>

        <!-- Portfolio Projects -->
        <section class="py-24 px-6 max-w-6xl mx-auto" id="projects">
            <h2 class="text-3xl font-bold mb-12 flex items-center gap-3">
                <span class="h-8 w-1 bg-blue-600 rounded-full"></span> Featured Projects
            </h2>
            <div id="projects-filters" class="flex flex-wrap gap-2 mb-6"></div>
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            <div id="projects-loadmore" class="mt-6 text-center"></div>
        </section>

        <!-- Skills Section -->
        <section class="py-24 px-6 max-w-6xl mx-auto" id="skills">
            <h2 class="text-3xl font-bold mb-12 flex items-center gap-3">
                <span class="h-8 w-1 bg-blue-600 rounded-full"></span> Technical Skills
            </h2>
            <div id="skills-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <!-- Experience Section -->
        <section class="py-24 px-6 max-w-6xl mx-auto" id="experience">
            <h2 class="text-3xl font-bold mb-12 flex items-center gap-3">
                <span class="h-8 w-1 bg-blue-600 rounded-full"></span> Work Experience
            </h2>
            <div id="experience-timeline" class="relative border-l-2 border-slate-200 ml-3 md:ml-6 pl-8 space-y-12"></div>
        </section>

        <!-- Education & Certs -->
        <section id="education" class="py-24 px-6 max-w-6xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
                <div>
                    <h2 class="text-3xl font-bold mb-12 flex items-center gap-3">
                        <span class="h-8 w-1 bg-blue-600 rounded-full"></span> Education
                    </h2>
                    <div id="education-list" class="space-y-8"></div>
                </div>
                <div>
                    <h2 class="text-3xl font-bold mb-12 flex items-center gap-3">
                        <span class="h-8 w-1 bg-blue-600 rounded-full"></span> Certifications
                    </h2>
                    <div id="certifications-list" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="bg-white py-24 px-6">
            <div class="max-w-4xl mx-auto" id="contact-container"></div>
        </section>

        <!-- Footer -->
        <footer class="bg-slate-900 text-white py-16 px-6 text-center">
            <div id="footer-content"></div>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
